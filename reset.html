<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Prompt Vault</title>
<style>
  body{background:#0d0d0f;color:#e8e0d0;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem;text-align:center;padding:2rem;}
  h2{color:#c9a84c;font-size:1.4rem;}
  p{color:#6b6b7a;font-size:.9rem;max-width:320px;line-height:1.6;}
  .btn{background:#c9a84c;color:#000;border:none;border-radius:10px;padding:.9rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;width:100%;max-width:300px;}
  .btn.danger{background:#c0392b;color:#fff;margin-top:.5rem;}
  .result{background:#1c1c22;border:1px solid #2a2a35;border-radius:8px;padding:1rem;font-size:.82rem;font-family:monospace;color:#c9a84c;max-width:320px;width:100%;display:none;text-align:left;}
</style>
</head>
<body>
<h2>🔧 Reset Prompt Vault</h2>
<p>กดปุ่มด้านล่างเพื่อล้าง session ที่ค้างอยู่ ข้อมูล Prompt ไม่หายครับ</p>
<button class="btn" onclick="resetSession()">✓ ล้าง Session (แนะนำ)</button>
<button class="btn danger" onclick="resetAll()">⚠ ล้างทุกอย่าง (ถ้ายังค้าง)</button>
<div class="result" id="result"></div>
<script>
function show(msg){
  const r=document.getElementById('result');
  r.style.display='block';r.textContent=msg;
}
function resetSession(){
  try{
    sessionStorage.clear();
    localStorage.removeItem('pv_ses');
    show('✓ ล้าง session แล้ว\nกลับไปเปิด prompt-vault.html ใหม่ได้เลยครับ');
  }catch(e){show('Error: '+e.message);}
}
function resetAll(){
  if(!confirm('ล้างทุกอย่างรวมถึงรหัสผ่าน? (Prompt ยังอยู่ถ้า Sync กับ GitHub ไว้แล้ว)'))return;
  try{
    const prompts=localStorage.getItem('pv_data');
    sessionStorage.clear();
    localStorage.clear();
    if(prompts)localStorage.setItem('pv_data',prompts);
    show('✓ ล้างแล้ว\nรหัสผ่านกลับเป็น 1234\nกลับไปเปิด prompt-vault.html ใหม่ได้เลยครับ');
  }catch(e){show('Error: '+e.message);}
}
</script>
</body>
</html>
