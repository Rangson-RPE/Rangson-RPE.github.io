<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --gold: #c9a84c;
    --gold-dim: #7a5f25;
    --cream: #e8e0d0;
    --muted: #6b6b7a;
    --text: #d4cdc3;
    --danger: #c0392b;
    --green: #2ecc71;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .4;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,15,.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem; font-weight: 700;
    color: var(--cream);
    letter-spacing: .02em;
    display: flex; align-items: center; gap: .6rem;
  }
  .logo span { color: var(--gold); }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--gold);
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    display: grid; place-items: center;
    font-size: .65rem; color: #000;
  }

  .header-right { display: flex; align-items: center; gap: 1rem; }
  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: .7rem; color: var(--gold);
    background: rgba(201,168,76,.1);
    border: 1px solid rgba(201,168,76,.25);
    padding: .25rem .65rem; border-radius: 2rem;
    letter-spacing: .05em;
  }

  /* ─── LAYOUT ─── */
  .app {
    position: relative; z-index: 1;
    max-width: 1400px; margin: 0 auto;
    padding: 2.5rem;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 2.5rem;
    align-items: start;
  }

  /* ─── PANEL ─── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    position: sticky; top: 84px;
  }

  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 700;
    color: var(--cream);
    margin-bottom: 1.75rem;
    padding-bottom: .75rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: .5rem;
  }
  .panel-title::before {
    content: '';
    width: 3px; height: 1.1rem;
    background: var(--gold); border-radius: 2px;
    display: inline-block;
  }

  /* ─── FORM ─── */
  .field { margin-bottom: 1.25rem; }
  label {
    display: block;
    font-size: .72rem; font-weight: 600;
    color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: .5rem;
    font-family: 'DM Mono', monospace;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'Sarabun', sans-serif;
    font-size: .95rem;
    padding: .75rem 1rem;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    resize: none;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,.1);
  }
  textarea { min-height: 140px; line-height: 1.6; }

  /* ─── IMAGE UPLOAD ─── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover { border-color: var(--gold-dim); background: rgba(201,168,76,.03); }
  .upload-zone.has-image { border-style: solid; border-color: var(--gold-dim); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-preview {
    width: 100%; max-height: 180px; object-fit: cover;
    border-radius: 6px; display: none;
  }
  .upload-placeholder { pointer-events: none; }
  .upload-icon { font-size: 2rem; margin-bottom: .5rem; opacity: .4; }
  .upload-text { font-size: .82rem; color: var(--muted); line-height: 1.5; }
  .upload-text strong { color: var(--gold); display: block; margin-bottom: .2rem; }

  /* ─── TAGS ─── */
  .tag-input-wrap {
    display: flex; flex-wrap: wrap; gap: .4rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .5rem .75rem;
    min-height: 44px; align-items: center;
    cursor: text; transition: border-color .2s;
  }
  .tag-input-wrap:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,.1); }
  .tag-item {
    background: rgba(201,168,76,.15);
    border: 1px solid rgba(201,168,76,.3);
    color: var(--gold);
    font-size: .75rem; font-family: 'DM Mono', monospace;
    padding: .2rem .55rem; border-radius: 4px;
    display: flex; align-items: center; gap: .35rem;
  }
  .tag-item button { background: none; border: none; color: inherit; cursor: pointer; padding: 0; font-size: .85rem; line-height: 1; opacity: .7; }
  .tag-input-wrap input {
    background: none; border: none; outline: none;
    color: var(--cream); font-family: 'Sarabun', sans-serif; font-size: .9rem;
    flex: 1; min-width: 80px; padding: .1rem 0;
  }

  /* ─── BUTTONS ─── */
  .btn-save {
    width: 100%;
    background: var(--gold);
    color: #000;
    border: none; border-radius: 8px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 600; font-size: .95rem;
    padding: .85rem;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
    margin-top: .5rem;
    letter-spacing: .03em;
  }
  .btn-save:hover { opacity: .88; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }

  .btn-clear {
    width: 100%;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Sarabun', sans-serif;
    font-size: .85rem;
    padding: .6rem;
    cursor: pointer;
    transition: color .2s, border-color .2s;
    margin-top: .5rem;
  }
  .btn-clear:hover { color: var(--cream); border-color: var(--muted); }

  /* ─── GALLERY AREA ─── */
  .gallery-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .gallery-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; color: var(--cream);
  }

  .search-bar {
    display: flex; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: .5rem 1rem; gap: .5rem;
    transition: border-color .2s;
  }
  .search-bar:focus-within { border-color: var(--gold); }
  .search-bar input {
    background: none; border: none; outline: none;
    color: var(--cream); font-family: 'Sarabun', sans-serif; font-size: .9rem;
    width: 180px;
  }
  .search-bar svg { color: var(--muted); flex-shrink: 0; }

  .filter-row { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-tag {
    font-family: 'DM Mono', monospace; font-size: .72rem;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); border-radius: 4px;
    padding: .3rem .7rem; cursor: pointer;
    transition: all .15s;
  }
  .filter-tag:hover, .filter-tag.active {
    border-color: var(--gold); color: var(--gold);
    background: rgba(201,168,76,.08);
  }

  /* ─── CARDS ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    animation: fadeUp .35s ease both;
    cursor: pointer;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--gold-dim);
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }

  .card-image {
    width: 100%; height: 160px; object-fit: cover;
    display: block;
    background: var(--surface2);
  }
  .card-no-img {
    height: 80px;
    background: linear-gradient(135deg, var(--surface2), var(--bg));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; color: var(--border);
  }

  .card-body { padding: 1rem 1.1rem 1.1rem; }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; color: var(--cream);
    margin-bottom: .4rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-prompt {
    font-size: .82rem; color: var(--muted); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
    font-family: 'DM Mono', monospace;
  }

  .card-tags { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .75rem; }
  .card-tag {
    font-family: 'DM Mono', monospace; font-size: .68rem;
    background: rgba(201,168,76,.1); color: var(--gold-dim);
    border: 1px solid rgba(201,168,76,.2);
    padding: .15rem .45rem; border-radius: 3px;
  }

  .card-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: .65rem 1.1rem;
    border-top: 1px solid var(--border);
  }
  .card-date { font-family: 'DM Mono', monospace; font-size: .68rem; color: var(--muted); }
  .card-actions { display: flex; gap: .4rem; }
  .icon-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: .3rem .5rem;
    cursor: pointer; color: var(--muted);
    transition: all .15s; font-size: .8rem; line-height: 1;
  }
  .icon-btn:hover { border-color: var(--gold); color: var(--gold); }
  .icon-btn.delete:hover { border-color: var(--danger); color: var(--danger); }

  /* ─── EMPTY STATE ─── */
  .empty {
    grid-column: 1 / -1;
    text-align: center; padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .3; }
  .empty h3 { font-family: 'Playfair Display', serif; color: var(--text); margin-bottom: .5rem; }
  .empty p { font-size: .88rem; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
    display: none; place-items: center; padding: 2rem;
  }
  .modal-overlay.open { display: grid; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    max-width: 640px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    animation: modalIn .25s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(.9); }
    to   { opacity: 1; transform: scale(1); }
  }
  .modal-img { width: 100%; max-height: 280px; object-fit: cover; border-radius: 14px 14px 0 0; }
  .modal-body { padding: 1.75rem; }
  .modal-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; color: var(--cream); margin-bottom: 1rem;
  }
  .modal-prompt-label {
    font-family: 'DM Mono', monospace; font-size: .72rem;
    color: var(--muted); letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: .5rem;
  }
  .modal-prompt-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem;
    font-family: 'DM Mono', monospace; font-size: .85rem;
    color: var(--text); line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
    position: relative;
  }
  .copy-btn {
    position: absolute; top: .6rem; right: .6rem;
    background: rgba(201,168,76,.15); border: 1px solid rgba(201,168,76,.3);
    color: var(--gold); border-radius: 6px; padding: .3rem .6rem;
    font-size: .72rem; cursor: pointer; font-family: 'DM Mono', monospace;
    transition: background .15s;
  }
  .copy-btn:hover { background: rgba(201,168,76,.3); }
  .modal-close {
    display: block; margin-top: 1.25rem;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px; padding: .65rem;
    width: 100%; cursor: pointer; font-family: 'Sarabun', sans-serif;
    font-size: .9rem; transition: all .15s;
  }
  .modal-close:hover { border-color: var(--gold); color: var(--cream); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
    background: var(--surface2); border: 1px solid var(--gold-dim);
    color: var(--gold); padding: .75rem 1.25rem; border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: .82rem;
    display: flex; align-items: center; gap: .5rem;
    transform: translateY(80px); opacity: 0;
    transition: transform .3s, opacity .3s;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .panel { position: static; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    Prompt<span>Vault</span>
  </div>
  <div class="header-right">
    <div class="count-badge" id="count-badge">0 prompts</div>
  </div>
</header>

<div class="app">
  <!-- ─── SIDEBAR FORM ─── -->
  <aside class="panel">
    <div class="panel-title">เพิ่ม Prompt ใหม่</div>

    <div class="field">
      <label>ชื่อ Prompt</label>
      <input type="text" id="inp-name" placeholder="เช่น Portrait Cinematic v2">
    </div>

    <div class="field">
      <label>Prompt Text</label>
      <textarea id="inp-prompt" placeholder="พิมพ์ prompt ที่ต้องการบันทึก..."></textarea>
    </div>

    <div class="field">
      <label>Tags</label>
      <div class="tag-input-wrap" id="tag-wrap">
        <input type="text" id="tag-input" placeholder="พิมพ์แล้วกด Enter">
      </div>
    </div>

    <div class="field">
      <label>ภาพตัวอย่าง</label>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="inp-image" accept="image/*">
        <img class="upload-preview" id="upload-preview" alt="">
        <div class="upload-placeholder" id="upload-placeholder">
          <div class="upload-icon">🖼</div>
          <div class="upload-text">
            <strong>คลิกเพื่ออัปโหลดรูป</strong>
            PNG, JPG, WEBP — ไม่เกิน 5 MB
          </div>
        </div>
      </div>
    </div>

    <button class="btn-save" onclick="savePrompt()">✦ บันทึก Prompt</button>
    <button class="btn-clear" onclick="clearForm()">ล้างฟอร์ม</button>
  </aside>

  <!-- ─── GALLERY ─── -->
  <main>
    <div class="gallery-header">
      <h2 class="gallery-title">คลัง Prompts</h2>
      <div class="search-bar">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="ค้นหา..." oninput="renderGallery()">
      </div>
    </div>

    <div class="filter-row" id="filter-row"></div>
    <div class="grid" id="gallery"></div>
  </main>
</div>

<!-- ─── DETAIL MODAL ─── -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <img class="modal-img" id="modal-img" src="" alt="" style="display:none">
    <div class="modal-body">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-prompt-label">PROMPT</div>
      <div class="modal-prompt-box" id="modal-prompt">
        <button class="copy-btn" onclick="copyPrompt()">copy</button>
        <span id="modal-prompt-text"></span>
      </div>
      <div class="card-tags" id="modal-tags" style="margin-top:1rem"></div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">ปิด</button>
    </div>
  </div>
</div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast">✦ <span id="toast-msg"></span></div>

<script>
  const STORAGE_KEY = 'promptvault_v1';
  let prompts = [];
  let tags = [];
  let activeFilter = null;
  let editMode = null;

  // ── Init
  function init() {
    const raw = localStorage.getItem(STORAGE_KEY);
    prompts = raw ? JSON.parse(raw) : [];
    renderGallery();
    renderFilters();
    updateCount();
  }

  // ── Storage
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
    updateCount();
  }
  function updateCount() {
    document.getElementById('count-badge').textContent = `${prompts.length} prompt${prompts.length !== 1 ? 's' : ''}`;
  }

  // ── Tags input
  let currentTags = [];
  document.getElementById('tag-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const v = e.target.value.trim().replace(/,/g,'');
      if (v && !currentTags.includes(v)) {
        currentTags.push(v);
        renderTagPills();
      }
      e.target.value = '';
    }
    if (e.key === 'Backspace' && !e.target.value && currentTags.length) {
      currentTags.pop(); renderTagPills();
    }
  });
  document.getElementById('tag-wrap').addEventListener('click', () => {
    document.getElementById('tag-input').focus();
  });
  function renderTagPills() {
    const wrap = document.getElementById('tag-wrap');
    wrap.querySelectorAll('.tag-item').forEach(t => t.remove());
    const input = document.getElementById('tag-input');
    currentTags.forEach((tag, i) => {
      const el = document.createElement('div');
      el.className = 'tag-item';
      el.innerHTML = `${tag}<button onclick="removeTag(${i})">×</button>`;
      wrap.insertBefore(el, input);
    });
  }
  function removeTag(i) { currentTags.splice(i, 1); renderTagPills(); }

  // ── Image preview
  let imageData = null;
  document.getElementById('inp-image').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('⚠ ไฟล์ใหญ่เกิน 5 MB'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      imageData = ev.target.result;
      const preview = document.getElementById('upload-preview');
      preview.src = imageData; preview.style.display = 'block';
      document.getElementById('upload-placeholder').style.display = 'none';
      document.getElementById('upload-zone').classList.add('has-image');
    };
    reader.readAsDataURL(file);
  });

  // ── Drag & drop
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--gold)'; });
  zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const dt = new DataTransfer(); dt.items.add(file);
    document.getElementById('inp-image').files = dt.files;
    document.getElementById('inp-image').dispatchEvent(new Event('change'));
  });

  // ── Save prompt
  function savePrompt() {
    const name = document.getElementById('inp-name').value.trim();
    const prompt = document.getElementById('inp-prompt').value.trim();
    if (!name) { showToast('⚠ กรุณาใส่ชื่อ Prompt'); document.getElementById('inp-name').focus(); return; }
    if (!prompt) { showToast('⚠ กรุณาใส่ Prompt Text'); document.getElementById('inp-prompt').focus(); return; }

    const entry = {
      id: editMode || Date.now().toString(),
      name, prompt,
      tags: [...currentTags],
      image: imageData,
      date: editMode ? (prompts.find(p=>p.id===editMode)?.date || new Date().toISOString()) : new Date().toISOString()
    };

    if (editMode) {
      const idx = prompts.findIndex(p => p.id === editMode);
      prompts[idx] = entry;
      editMode = null;
      document.querySelector('.btn-save').textContent = '✦ บันทึก Prompt';
    } else {
      prompts.unshift(entry);
    }

    save(); clearForm(); renderGallery(); renderFilters();
    showToast('✓ บันทึก Prompt แล้ว');
  }

  // ── Clear form
  function clearForm() {
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-prompt').value = '';
    currentTags = []; renderTagPills();
    imageData = null;
    document.getElementById('upload-preview').style.display = 'none';
    document.getElementById('upload-placeholder').style.display = '';
    document.getElementById('upload-zone').classList.remove('has-image');
    document.getElementById('inp-image').value = '';
    editMode = null;
    document.querySelector('.btn-save').textContent = '✦ บันทึก Prompt';
  }

  // ── Render gallery
  function renderGallery() {
    const q = (document.getElementById('search-input')?.value || '').toLowerCase();
    const gallery = document.getElementById('gallery');
    let list = prompts.filter(p => {
      const match = !q || p.name.toLowerCase().includes(q) || p.prompt.toLowerCase().includes(q) || p.tags.some(t => t.toLowerCase().includes(q));
      const tagMatch = !activeFilter || p.tags.includes(activeFilter);
      return match && tagMatch;
    });

    if (!list.length) {
      gallery.innerHTML = `<div class="empty">
        <div class="empty-icon">✦</div>
        <h3>${prompts.length ? 'ไม่พบผลการค้นหา' : 'ยังไม่มี Prompt'}</h3>
        <p>${prompts.length ? 'ลองเปลี่ยนคำค้นหาดูนะ' : 'เพิ่ม Prompt แรกของคุณจากแผงด้านซ้ายได้เลย'}</p>
      </div>`;
      return;
    }

    gallery.innerHTML = list.map((p, i) => `
      <div class="card" style="animation-delay:${i * .04}s" onclick="openModal('${p.id}')">
        ${p.image
          ? `<img class="card-image" src="${p.image}" alt="${esc(p.name)}">`
          : `<div class="card-no-img">🖼</div>`}
        <div class="card-body">
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-prompt">${esc(p.prompt)}</div>
          ${p.tags.length ? `<div class="card-tags">${p.tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}</div>` : ''}
        </div>
        <div class="card-footer">
          <span class="card-date">${fmtDate(p.date)}</span>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" title="แก้ไข" onclick="editPrompt('${p.id}')">✎</button>
            <button class="icon-btn delete" title="ลบ" onclick="deletePrompt('${p.id}')">✕</button>
          </div>
        </div>
      </div>`).join('');
  }

  // ── Filters
  function renderFilters() {
    const all = [...new Set(prompts.flatMap(p => p.tags))];
    const row = document.getElementById('filter-row');
    row.innerHTML = all.length ? `
      <span class="filter-tag ${!activeFilter?'active':''}" onclick="setFilter(null)">ทั้งหมด</span>
      ${all.map(t => `<span class="filter-tag ${activeFilter===t?'active':''}" onclick="setFilter('${esc(t)}')">${esc(t)}</span>`).join('')}
    ` : '';
  }
  function setFilter(tag) { activeFilter = tag; renderFilters(); renderGallery(); }

  // ── Modal
  function openModal(id) {
    const p = prompts.find(x => x.id === id);
    if (!p) return;
    const img = document.getElementById('modal-img');
    img.src = p.image || ''; img.style.display = p.image ? 'block' : 'none';
    document.getElementById('modal-name').textContent = p.name;
    document.getElementById('modal-prompt-text').textContent = p.prompt;
    document.getElementById('modal-tags').innerHTML = p.tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('');
    document.getElementById('modal').classList.add('open');
  }
  function closeModal(e) {
    if (e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('open');
  }

  function copyPrompt() {
    const text = document.getElementById('modal-prompt-text').textContent;
    navigator.clipboard.writeText(text).then(() => showToast('✓ คัดลอก Prompt แล้ว'));
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'copied!'; setTimeout(() => btn.textContent = 'copy', 1500);
  }

  // ── Edit
  function editPrompt(id) {
    const p = prompts.find(x => x.id === id);
    if (!p) return;
    document.getElementById('inp-name').value = p.name;
    document.getElementById('inp-prompt').value = p.prompt;
    currentTags = [...p.tags]; renderTagPills();
    imageData = p.image || null;
    const preview = document.getElementById('upload-preview');
    if (imageData) {
      preview.src = imageData; preview.style.display = 'block';
      document.getElementById('upload-placeholder').style.display = 'none';
      document.getElementById('upload-zone').classList.add('has-image');
    } else { clearImagePreview(); }
    editMode = id;
    document.querySelector('.btn-save').textContent = '✦ อัปเดต Prompt';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.getElementById('inp-name').focus();
  }
  function clearImagePreview() {
    document.getElementById('upload-preview').style.display = 'none';
    document.getElementById('upload-placeholder').style.display = '';
    document.getElementById('upload-zone').classList.remove('has-image');
  }

  // ── Delete
  function deletePrompt(id) {
    if (!confirm('ลบ Prompt นี้?')) return;
    prompts = prompts.filter(p => p.id !== id);
    if (activeFilter && !prompts.some(p => p.tags.includes(activeFilter))) activeFilter = null;
    save(); renderGallery(); renderFilters();
    showToast('✓ ลบ Prompt แล้ว');
  }

  // ── Toast
  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // ── Utils
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
  }

  init();
</script>
</body>
</html>
