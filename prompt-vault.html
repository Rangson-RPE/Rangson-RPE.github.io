<html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f; --surface: #141418; --surface2: #1c1c22;
    --border: #2a2a35; --gold: #c9a84c; --gold-dim: #7a5f25;
    --cream: #e8e0d0; --muted: #6b6b7a; --text: #d4cdc3; --danger: #c0392b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .4;
  }

  /* ══ LOCK SCREEN ══ */
  #lock-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .lock-box {
    position: relative; z-index: 1; background: var(--surface);
    border: 1px solid var(--border); border-radius: 22px;
    padding: 2.75rem 2.5rem 2rem; width: 100%; max-width: 360px;
    text-align: center; animation: lockIn .45s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes lockIn { from { opacity:0; transform:scale(.88) translateY(24px); } to { opacity:1; transform:scale(1) translateY(0); } }

  .lock-icon-ring {
    width: 70px; height: 70px; border-radius: 50%;
    background: rgba(201,168,76,.08); border: 1.5px solid rgba(201,168,76,.25);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.4rem; font-size: 1.8rem;
    transition: transform .35s cubic-bezier(.34,1.56,.64,1), background .3s, border-color .3s;
  }
  .lock-icon-ring.bounce { transform: rotate(-12deg) scale(1.15); }
  .lock-icon-ring.open   { transform: scale(1.2); background: rgba(46,204,113,.12); border-color: rgba(46,204,113,.4); }

  .lock-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--cream); margin-bottom: .35rem; }
  .lock-sub   { font-size: .82rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }

  .pin-dots { display: flex; gap: .55rem; justify-content: center; margin-bottom: 1.2rem; min-height: 18px; }
  .pin-dot  { width: 11px; height: 11px; border-radius: 50%; background: var(--border); transition: background .18s, transform .18s; }
  .pin-dot.filled { background: var(--gold); transform: scale(1.25); }
  .pin-dot.err    { background: var(--danger); transform: scale(1.1); }

  .lock-input-row { position: relative; margin-bottom: .8rem; }
  #lock-pw {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--cream); font-family: 'DM Mono', monospace;
    font-size: 1.05rem; letter-spacing: .2em; padding: .85rem 3rem .85rem 1rem;
    text-align: center; outline: none; transition: border-color .2s, box-shadow .2s;
  }
  #lock-pw:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,.12); }
  #lock-pw.err   { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(192,57,43,.1); animation: shake .38s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

  .eye-btn {
    position: absolute; right: .8rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1rem; line-height: 1; padding: .2rem; transition: color .15s;
  }
  .eye-btn:hover { color: var(--gold); }

  .lock-err-msg { min-height: 1rem; font-size: .78rem; color: var(--danger); font-family: 'DM Mono', monospace; margin-bottom: .8rem; }

  .lock-submit {
    width: 100%; background: var(--gold); color: #000; border: none; border-radius: 10px;
    font-family: 'Sarabun', sans-serif; font-weight: 700; font-size: 1rem; padding: .9rem;
    cursor: pointer; transition: opacity .2s, transform .15s; letter-spacing: .03em;
  }
  .lock-submit:hover:not(:disabled) { opacity: .87; transform: translateY(-1px); }
  .lock-submit:active:not(:disabled) { transform: translateY(0); }
  .lock-submit:disabled { opacity: .38; cursor: not-allowed; }

  .attempts-txt { margin-top: .9rem; font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); letter-spacing: .05em; }
  .attempts-txt b { color: var(--gold); }

  .cooldown-wrap { margin-top: .6rem; display: none; }
  .cooldown-bar  { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
  .cooldown-fill { height: 100%; background: var(--danger); transition: width 1s linear; }
  .cooldown-txt  { font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--danger); margin-top: .4rem; }

  .lock-divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0 1rem; }
  .lock-hint    { font-size: .75rem; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: .04em; }
  .lock-hint b  { color: var(--gold-dim); }
  .chpw-link {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: .75rem; font-family: 'DM Mono', monospace; letter-spacing: .05em;
    text-decoration: underline; text-underline-offset: 3px;
    transition: color .15s; margin-top: .6rem; display: inline-block;
  }
  .chpw-link:hover { color: var(--gold); }

  /* ══ CHANGE PW MODAL ══ */
  #chpw-modal {
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
    display: none; place-items: center; padding: 2rem;
  }
  #chpw-modal.open { display: grid; }
  .chpw-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 2rem; width: 100%; max-width: 340px;
    animation: lockIn .3s cubic-bezier(.34,1.56,.64,1) both;
  }
  .chpw-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--cream); margin-bottom: 1.25rem; padding-bottom: .75rem; border-bottom: 1px solid var(--border); }
  .chpw-field { margin-bottom: .9rem; }
  .chpw-field label { display: block; font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: .4rem; }
  .chpw-field input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; color: var(--cream); font-family: 'DM Mono', monospace; font-size: .95rem; padding: .7rem .9rem; outline: none; transition: border-color .2s; }
  .chpw-field input:focus { border-color: var(--gold); }
  .chpw-err { font-size: .78rem; color: var(--danger); font-family: 'DM Mono', monospace; min-height: 1rem; margin-bottom: .6rem; }
  .chpw-row { display: flex; gap: .6rem; }
  .chpw-save { flex:1; background: var(--gold); color: #000; border: none; border-radius: 8px; font-family: 'Sarabun', sans-serif; font-weight: 700; padding: .75rem; cursor: pointer; transition: opacity .2s; }
  .chpw-save:hover { opacity: .87; }
  .chpw-cancel { flex:1; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; font-family: 'Sarabun', sans-serif; padding: .75rem; cursor: pointer; transition: color .15s, border-color .15s; }
  .chpw-cancel:hover { color: var(--cream); border-color: var(--muted); }

  /* ══ MAIN APP ══ */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,15,.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2.5rem; display: flex; align-items: center; justify-content: space-between; height: 64px;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; color: var(--cream); letter-spacing: .02em; display: flex; align-items: center; gap: .6rem; }
  .logo span { color: var(--gold); }
  .logo-icon { width: 28px; height: 28px; background: var(--gold); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display: grid; place-items: center; font-size: .65rem; color: #000; }
  .header-right { display: flex; align-items: center; gap: .8rem; }
  .count-badge { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--gold); background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.25); padding: .25rem .65rem; border-radius: 2rem; letter-spacing: .05em; }
  .lock-app-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: .35rem .7rem; cursor: pointer; font-size: .8rem; font-family: 'Sarabun', sans-serif; transition: color .15s, border-color .15s; }
  .lock-app-btn:hover { color: var(--gold); border-color: var(--gold); }

  .app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 2.5rem; display: grid; grid-template-columns: 380px 1fr; gap: 2.5rem; align-items: start; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; position: sticky; top: 84px; }
  .panel-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--cream); margin-bottom: 1.75rem; padding-bottom: .75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .5rem; }
  .panel-title::before { content: ''; width: 3px; height: 1.1rem; background: var(--gold); border-radius: 2px; display: inline-block; }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: .72rem; font-weight: 600; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: .5rem; font-family: 'DM Mono', monospace; }
  input[type="text"], textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--cream); font-family: 'Sarabun', sans-serif; font-size: .95rem; padding: .75rem 1rem; transition: border-color .2s, box-shadow .2s; outline: none; resize: none; }
  input[type="text"]:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,.1); }
  textarea { min-height: 140px; line-height: 1.6; }
  .upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 1.5rem; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; position: relative; overflow: hidden; }
  .upload-zone:hover { border-color: var(--gold-dim); background: rgba(201,168,76,.03); }
  .upload-zone.has-image { border-style: solid; border-color: var(--gold-dim); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 6px; display: none; }
  .upload-placeholder { pointer-events: none; }
  .upload-icon { font-size: 2rem; margin-bottom: .5rem; opacity: .4; }
  .upload-text { font-size: .82rem; color: var(--muted); line-height: 1.5; }
  .upload-text strong { color: var(--gold); display: block; margin-bottom: .2rem; }
  .tag-input-wrap { display: flex; flex-wrap: wrap; gap: .4rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .5rem .75rem; min-height: 44px; align-items: center; cursor: text; transition: border-color .2s; }
  .tag-input-wrap:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,.1); }
  .tag-item { background: rgba(201,168,76,.15); border: 1px solid rgba(201,168,76,.3); color: var(--gold); font-size: .75rem; font-family: 'DM Mono', monospace; padding: .2rem .55rem; border-radius: 4px; display: flex; align-items: center; gap: .35rem; }
  .tag-item button { background: none; border: none; color: inherit; cursor: pointer; padding: 0; font-size: .85rem; line-height: 1; opacity: .7; }
  .tag-input-wrap input { background: none; border: none; outline: none; color: var(--cream); font-family: 'Sarabun', sans-serif; font-size: .9rem; flex: 1; min-width: 80px; padding: .1rem 0; }
  .btn-save { width: 100%; background: var(--gold); color: #000; border: none; border-radius: 8px; font-family: 'Sarabun', sans-serif; font-weight: 600; font-size: .95rem; padding: .85rem; cursor: pointer; transition: opacity .2s, transform .15s; margin-top: .5rem; letter-spacing: .03em; }
  .btn-save:hover { opacity: .88; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }
  .btn-clear { width: 100%; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: .85rem; padding: .6rem; cursor: pointer; transition: color .2s, border-color .2s; margin-top: .5rem; }
  .btn-clear:hover { color: var(--cream); border-color: var(--muted); }
  .gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .gallery-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--cream); }
  .search-bar { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .5rem 1rem; gap: .5rem; transition: border-color .2s; }
  .search-bar:focus-within { border-color: var(--gold); }
  .search-bar input { background: none; border: none; outline: none; color: var(--cream); font-family: 'Sarabun', sans-serif; font-size: .9rem; width: 180px; }
  .search-bar svg { color: var(--muted); flex-shrink: 0; }
  .filter-row { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-tag { font-family: 'DM Mono', monospace; font-size: .72rem; background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: .3rem .7rem; cursor: pointer; transition: all .15s; }
  .filter-tag:hover, .filter-tag.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.08); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: transform .2s, border-color .2s, box-shadow .2s; animation: fadeUp .35s ease both; cursor: pointer; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .card:hover { transform: translateY(-3px); border-color: var(--gold-dim); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
  .card-image { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--surface2); }
  .card-no-img { height: 80px; background: linear-gradient(135deg, var(--surface2), var(--bg)); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--border); }
  .card-body { padding: 1rem 1.1rem 1.1rem; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--cream); margin-bottom: .4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-prompt { font-size: .82rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; font-family: 'DM Mono', monospace; }
  .card-tags { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .75rem; }
  .card-tag { font-family: 'DM Mono', monospace; font-size: .68rem; background: rgba(201,168,76,.1); color: var(--gold-dim); border: 1px solid rgba(201,168,76,.2); padding: .15rem .45rem; border-radius: 3px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; padding: .65rem 1.1rem; border-top: 1px solid var(--border); }
  .card-date { font-family: 'DM Mono', monospace; font-size: .68rem; color: var(--muted); }
  .card-actions { display: flex; gap: .4rem; }
  .icon-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: .3rem .5rem; cursor: pointer; color: var(--muted); transition: all .15s; font-size: .8rem; line-height: 1; }
  .icon-btn:hover { border-color: var(--gold); color: var(--gold); }
  .icon-btn.delete:hover { border-color: var(--danger); color: var(--danger); }
  .empty { grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .3; }
  .empty h3 { font-family: 'Playfair Display', serif; color: var(--text); margin-bottom: .5rem; }
  .empty p { font-size: .88rem; }
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.75); backdrop-filter: blur(6px); display: none; place-items: center; padding: 2rem; }
  .modal-overlay.open { display: grid; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; animation: modalIn .25s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes modalIn { from { opacity:0; transform:scale(.9); } to { opacity:1; transform:scale(1); } }
  .modal-img { width: 100%; max-height: 280px; object-fit: cover; border-radius: 14px 14px 0 0; }
  .modal-body { padding: 1.75rem; }
  .modal-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--cream); margin-bottom: 1rem; }
  .modal-prompt-label { font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: .5rem; }
  .modal-prompt-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; font-family: 'DM Mono', monospace; font-size: .85rem; color: var(--text); line-height: 1.7; white-space: pre-wrap; word-break: break-word; position: relative; }
  .copy-btn { position: absolute; top: .6rem; right: .6rem; background: rgba(201,168,76,.15); border: 1px solid rgba(201,168,76,.3); color: var(--gold); border-radius: 6px; padding: .3rem .6rem; font-size: .72rem; cursor: pointer; font-family: 'DM Mono', monospace; transition: background .15s; }
  .copy-btn:hover { background: rgba(201,168,76,.3); }
  .modal-close { display: block; margin-top: 1.25rem; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: .65rem; width: 100%; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: .9rem; transition: all .15s; }
  .modal-close:hover { border-color: var(--gold); color: var(--cream); }
  .toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 999; background: var(--surface2); border: 1px solid var(--gold-dim); color: var(--gold); padding: .75rem 1.25rem; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: .82rem; display: flex; align-items: center; gap: .5rem; transform: translateY(80px); opacity: 0; transition: transform .3s, opacity .3s; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  @media (max-width: 900px) { .app { grid-template-columns: 1fr; } .panel { position: static; } }
</style>
</head>
<body>

<!-- ══ LOCK SCREEN ══ -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon-ring" id="lock-icon">🔒</div>
    <div class="lock-title">Prompt Vault</div>
    <div class="lock-sub">ใส่รหัสผ่านเพื่อเข้าใช้งาน</div>

    <div class="pin-dots" id="pin-dots"></div>

    <div class="lock-input-row">
      <input type="password" id="lock-pw" placeholder="รหัสผ่าน" maxlength="32"
             autocomplete="current-password"
             oninput="onPwInput()" onkeydown="if(event.key==='Enter')tryUnlock()">
      <button class="eye-btn" id="eye-btn" onclick="toggleEye()" tabindex="-1">👁</button>
    </div>

    <div class="lock-err-msg" id="lock-err"></div>
    <button class="lock-submit" id="lock-submit" onclick="tryUnlock()">เข้าสู่ระบบ</button>

    <div class="attempts-txt">ความพยายาม: <b id="attempt-count">0</b> / 5</div>
    <div class="cooldown-wrap" id="cooldown-wrap">
      <div class="cooldown-bar"><div class="cooldown-fill" id="cooldown-fill"></div></div>
      <div class="cooldown-txt" id="cooldown-txt"></div>
    </div>

    <hr class="lock-divider">
    <div class="lock-hint">รหัสเริ่มต้น: <b>1234</b></div>
    <button class="chpw-link" onclick="openChpw()">🔑 เปลี่ยนรหัสผ่าน</button>
  </div>
</div>

<!-- ══ CHANGE PW MODAL ══ -->
<div id="chpw-modal">
  <div class="chpw-box">
    <div class="chpw-title">🔑 เปลี่ยนรหัสผ่าน</div>
    <div class="chpw-field">
      <label>รหัสผ่านปัจจุบัน</label>
      <input type="password" id="chpw-old" placeholder="••••••••">
    </div>
    <div class="chpw-field">
      <label>รหัสผ่านใหม่ (อย่างน้อย 4 ตัว)</label>
      <input type="password" id="chpw-new" placeholder="••••••••">
    </div>
    <div class="chpw-field">
      <label>ยืนยันรหัสผ่านใหม่</label>
      <input type="password" id="chpw-confirm" placeholder="••••••••">
    </div>
    <div class="chpw-err" id="chpw-err"></div>
    <div class="chpw-row">
      <button class="chpw-save" onclick="doChangePassword()">บันทึก</button>
      <button class="chpw-cancel" onclick="closeChpw()">ยกเลิก</button>
    </div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="main-app" style="display:none">

<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    Prompt<span>Vault</span>
  </div>
  <div class="header-right">
    <div class="count-badge" id="count-badge">0 prompts</div>
    <button class="lock-app-btn" onclick="lockApp()">🔒 ล็อค</button>
  </div>
</header>

<div class="app">
  <aside class="panel">
    <div class="panel-title">เพิ่ม Prompt ใหม่</div>
    <div class="field">
      <label>ชื่อ Prompt</label>
      <input type="text" id="inp-name" placeholder="เช่น Portrait Cinematic v2">
    </div>
    <div class="field">
      <label>Prompt Text</label>
      <textarea id="inp-prompt" placeholder="พิมพ์ prompt ที่ต้องการบันทึก..."></textarea>
    </div>
    <div class="field">
      <label>Tags</label>
      <div class="tag-input-wrap" id="tag-wrap">
        <input type="text" id="tag-input" placeholder="พิมพ์แล้วกด Enter">
      </div>
    </div>
    <div class="field">
      <label>ภาพตัวอย่าง</label>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="inp-image" accept="image/*">
        <img class="upload-preview" id="upload-preview" alt="">
        <div class="upload-placeholder" id="upload-placeholder">
          <div class="upload-icon">🖼</div>
          <div class="upload-text"><strong>คลิกเพื่ออัปโหลดรูป</strong>PNG, JPG, WEBP — ไม่เกิน 5 MB</div>
        </div>
      </div>
    </div>
    <button class="btn-save" onclick="savePrompt()">✦ บันทึก Prompt</button>
    <button class="btn-clear" onclick="clearForm()">ล้างฟอร์ม</button>
  </aside>

  <main>
    <div class="gallery-header">
      <h2 class="gallery-title">คลัง Prompts</h2>
      <div class="search-bar">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="ค้นหา..." oninput="renderGallery()">
      </div>
    </div>
    <div class="filter-row" id="filter-row"></div>
    <div class="grid" id="gallery"></div>
  </main>
</div>
</div><!-- /main-app -->

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <img class="modal-img" id="modal-img" src="" alt="" style="display:none">
    <div class="modal-body">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-prompt-label">PROMPT</div>
      <div class="modal-prompt-box">
        <button class="copy-btn" onclick="copyPrompt()">copy</button>
        <span id="modal-prompt-text"></span>
      </div>
      <div class="card-tags" id="modal-tags" style="margin-top:1rem"></div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">ปิด</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✦ <span id="toast-msg"></span></div>

<script>
/* ════════ LOCK ════════ */
const PW_KEY = 'pv_pw';
const SES_KEY = 'pv_ses';
const DEFAULT_PW = '1234';
const MAX_TRIES = 5;
const SES_MS = 30 * 60 * 1000; // 30 min

let lockAttempts = 0;
let cooldownTimer = null;

const getPassword = () => localStorage.getItem(PW_KEY) || DEFAULT_PW;
const isSessionValid = () => { const t = sessionStorage.getItem(SES_KEY); return t && (Date.now() - +t) < SES_MS; };

function onPwInput() {
  const v = document.getElementById('lock-pw').value;
  document.getElementById('lock-err').textContent = '';
  document.getElementById('lock-pw').classList.remove('err');
  renderPinDots(v.length);
}

function renderPinDots(filled) {
  const pw = getPassword();
  const isPin = /^\d{4,8}$/.test(pw);
  const wrap = document.getElementById('pin-dots');
  if (!isPin) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = Array.from({length: pw.length}, (_,i) =>
    `<div class="pin-dot${i < filled ? ' filled' : ''}"></div>`).join('');
}

function toggleEye() {
  const el = document.getElementById('lock-pw');
  const btn = document.getElementById('eye-btn');
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

function tryUnlock() {
  if (cooldownTimer) return;
  const el = document.getElementById('lock-pw');
  const val = el.value;
  if (!val) { document.getElementById('lock-err').textContent = '⚠ กรุณาใส่รหัสผ่าน'; el.focus(); return; }

  if (val === getPassword()) {
    lockAttempts = 0;
    document.getElementById('attempt-count').textContent = '0';
    const icon = document.getElementById('lock-icon');
    icon.textContent = '🔓'; icon.classList.add('open');
    document.getElementById('lock-err').textContent = '';
    sessionStorage.setItem(SES_KEY, Date.now());
    setTimeout(() => {
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      appInit();
    }, 480);
  } else {
    lockAttempts++;
    document.getElementById('attempt-count').textContent = lockAttempts;
    el.classList.add('err'); el.value = ''; renderPinDots(0);
    setTimeout(() => el.classList.remove('err'), 450);
    const icon = document.getElementById('lock-icon');
    icon.classList.add('bounce'); setTimeout(() => icon.classList.remove('bounce'), 500);
    document.querySelectorAll('.pin-dot').forEach(d => { d.classList.add('err'); setTimeout(() => d.classList.remove('err'), 400); });

    if (lockAttempts >= MAX_TRIES) {
      startCooldown(30);
      document.getElementById('lock-err').textContent = '⛔ ลองเกินกำหนด — รอ 30 วินาที';
    } else {
      document.getElementById('lock-err').textContent = `✕ รหัสผ่านไม่ถูกต้อง (เหลือ ${MAX_TRIES - lockAttempts} ครั้ง)`;
    }
  }
}

function startCooldown(sec) {
  const submit = document.getElementById('lock-submit');
  const pw = document.getElementById('lock-pw');
  const wrap = document.getElementById('cooldown-wrap');
  const fill = document.getElementById('cooldown-fill');
  const txt = document.getElementById('cooldown-txt');
  submit.disabled = pw.disabled = true;
  wrap.style.display = 'block'; fill.style.width = '100%';
  let rem = sec;
  cooldownTimer = setInterval(() => {
    rem--;
    fill.style.width = `${(rem/sec)*100}%`;
    txt.textContent = `ปลดล็อคใน ${rem} วินาที...`;
    if (rem <= 0) {
      clearInterval(cooldownTimer); cooldownTimer = null;
      submit.disabled = pw.disabled = false;
      wrap.style.display = 'none'; lockAttempts = 0;
      document.getElementById('attempt-count').textContent = '0';
      document.getElementById('lock-err').textContent = '';
      pw.focus();
    }
  }, 1000);
}

function lockApp() {
  sessionStorage.removeItem(SES_KEY);
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'flex';
  const icon = document.getElementById('lock-icon');
  icon.textContent = '🔒'; icon.classList.remove('open');
  document.getElementById('lock-pw').value = '';
  document.getElementById('lock-err').textContent = '';
  renderPinDots(0);
  setTimeout(() => document.getElementById('lock-pw').focus(), 100);
}

/* Change PW */
function openChpw() {
  ['chpw-old','chpw-new','chpw-confirm'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('chpw-err').textContent = '';
  document.getElementById('chpw-modal').classList.add('open');
}
function closeChpw() { document.getElementById('chpw-modal').classList.remove('open'); }
document.getElementById('chpw-modal').addEventListener('click', e => { if(e.target.id === 'chpw-modal') closeChpw(); });

function doChangePassword() {
  const old = document.getElementById('chpw-old').value;
  const nw  = document.getElementById('chpw-new').value;
  const cf  = document.getElementById('chpw-confirm').value;
  const err = document.getElementById('chpw-err');
  if (old !== getPassword()) { err.textContent = '✕ รหัสผ่านปัจจุบันไม่ถูกต้อง'; return; }
  if (nw.length < 4) { err.textContent = '✕ รหัสผ่านใหม่ต้องมีอย่างน้อย 4 ตัว'; return; }
  if (nw !== cf) { err.textContent = '✕ รหัสผ่านใหม่ไม่ตรงกัน'; return; }
  localStorage.setItem(PW_KEY, nw);
  closeChpw(); showToast('✓ เปลี่ยนรหัสผ่านสำเร็จ'); renderPinDots(0);
}

/* ════════ APP ════════ */
const DATA_KEY = 'promptvault_v1';
let prompts = [], activeFilter = null, editMode = null;

function appInit() {
  const raw = localStorage.getItem(DATA_KEY);
  prompts = raw ? JSON.parse(raw) : [];
  renderGallery(); renderFilters(); updateCount();
}
function saveData() { localStorage.setItem(DATA_KEY, JSON.stringify(prompts)); updateCount(); }
function updateCount() { document.getElementById('count-badge').textContent = `${prompts.length} prompt${prompts.length!==1?'s':''}`; }

/* Tags */
let currentTags = [];
document.getElementById('tag-input').addEventListener('keydown', e => {
  if (e.key==='Enter'||e.key===',') { e.preventDefault(); const v=e.target.value.trim().replace(/,/g,''); if(v&&!currentTags.includes(v)){currentTags.push(v);renderTagPills();} e.target.value=''; }
  if (e.key==='Backspace'&&!e.target.value&&currentTags.length) { currentTags.pop(); renderTagPills(); }
});
document.getElementById('tag-wrap').addEventListener('click', ()=>document.getElementById('tag-input').focus());
function renderTagPills() {
  const wrap=document.getElementById('tag-wrap'), input=document.getElementById('tag-input');
  wrap.querySelectorAll('.tag-item').forEach(t=>t.remove());
  currentTags.forEach((tag,i)=>{ const el=document.createElement('div'); el.className='tag-item'; el.innerHTML=`${tag}<button onclick="removeTag(${i})">×</button>`; wrap.insertBefore(el,input); });
}
function removeTag(i){currentTags.splice(i,1);renderTagPills();}

/* Image */
let imageData=null;
document.getElementById('inp-image').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  if(file.size>5*1024*1024){showToast('⚠ ไฟล์ใหญ่เกิน 5 MB');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    imageData=ev.target.result;
    const p=document.getElementById('upload-preview');
    p.src=imageData; p.style.display='block';
    document.getElementById('upload-placeholder').style.display='none';
    document.getElementById('upload-zone').classList.add('has-image');
  };
  reader.readAsDataURL(file);
});
const uploadZone=document.getElementById('upload-zone');
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.style.borderColor='var(--gold)';});
uploadZone.addEventListener('dragleave',()=>{uploadZone.style.borderColor='';});
uploadZone.addEventListener('drop',e=>{
  e.preventDefault();uploadZone.style.borderColor='';
  const file=e.dataTransfer.files[0];
  if(!file||!file.type.startsWith('image/'))return;
  const dt=new DataTransfer();dt.items.add(file);
  document.getElementById('inp-image').files=dt.files;
  document.getElementById('inp-image').dispatchEvent(new Event('change'));
});

function savePrompt(){
  const name=document.getElementById('inp-name').value.trim();
  const prompt=document.getElementById('inp-prompt').value.trim();
  if(!name){showToast('⚠ กรุณาใส่ชื่อ Prompt');document.getElementById('inp-name').focus();return;}
  if(!prompt){showToast('⚠ กรุณาใส่ Prompt Text');document.getElementById('inp-prompt').focus();return;}
  const entry={id:editMode||Date.now().toString(),name,prompt,tags:[...currentTags],image:imageData,date:editMode?(prompts.find(p=>p.id===editMode)?.date||new Date().toISOString()):new Date().toISOString()};
  if(editMode){const idx=prompts.findIndex(p=>p.id===editMode);prompts[idx]=entry;editMode=null;document.querySelector('.btn-save').textContent='✦ บันทึก Prompt';}
  else{prompts.unshift(entry);}
  saveData();clearForm();renderGallery();renderFilters();showToast('✓ บันทึก Prompt แล้ว');
}

function clearForm(){
  document.getElementById('inp-name').value='';document.getElementById('inp-prompt').value='';
  currentTags=[];renderTagPills();imageData=null;
  document.getElementById('upload-preview').style.display='none';
  document.getElementById('upload-placeholder').style.display='';
  document.getElementById('upload-zone').classList.remove('has-image');
  document.getElementById('inp-image').value='';
  editMode=null;document.querySelector('.btn-save').textContent='✦ บันทึก Prompt';
}

function renderGallery(){
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  const gallery=document.getElementById('gallery');
  const list=prompts.filter(p=>(!q||p.name.toLowerCase().includes(q)||p.prompt.toLowerCase().includes(q)||p.tags.some(t=>t.toLowerCase().includes(q)))&&(!activeFilter||p.tags.includes(activeFilter)));
  if(!list.length){gallery.innerHTML=`<div class="empty"><div class="empty-icon">✦</div><h3>${prompts.length?'ไม่พบผลการค้นหา':'ยังไม่มี Prompt'}</h3><p>${prompts.length?'ลองเปลี่ยนคำค้นหาดูนะ':'เพิ่ม Prompt แรกจากแผงด้านซ้าย'}</p></div>`;return;}
  gallery.innerHTML=list.map((p,i)=>`<div class="card" style="animation-delay:${i*.04}s" onclick="openModal('${p.id}')">
    ${p.image?`<img class="card-image" src="${p.image}" alt="${esc(p.name)}">`:`<div class="card-no-img">🖼</div>`}
    <div class="card-body"><div class="card-name">${esc(p.name)}</div><div class="card-prompt">${esc(p.prompt)}</div>${p.tags.length?`<div class="card-tags">${p.tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}</div>`:''}</div>
    <div class="card-footer"><span class="card-date">${fmtDate(p.date)}</span><div class="card-actions" onclick="event.stopPropagation()"><button class="icon-btn" onclick="editPrompt('${p.id}')">✎</button><button class="icon-btn delete" onclick="deletePrompt('${p.id}')">✕</button></div></div>
  </div>`).join('');
}

function renderFilters(){
  const all=[...new Set(prompts.flatMap(p=>p.tags))];
  document.getElementById('filter-row').innerHTML=all.length?`<span class="filter-tag ${!activeFilter?'active':''}" onclick="setFilter(null)">ทั้งหมด</span>${all.map(t=>`<span class="filter-tag ${activeFilter===t?'active':''}" onclick="setFilter('${esc(t)}')">${esc(t)}</span>`).join('')}`:'';
}
function setFilter(tag){activeFilter=tag;renderFilters();renderGallery();}

function openModal(id){
  const p=prompts.find(x=>x.id===id);if(!p)return;
  const img=document.getElementById('modal-img');
  img.src=p.image||'';img.style.display=p.image?'block':'none';
  document.getElementById('modal-name').textContent=p.name;
  document.getElementById('modal-prompt-text').textContent=p.prompt;
  document.getElementById('modal-tags').innerHTML=p.tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(e){if(e.target.id==='modal')document.getElementById('modal').classList.remove('open');}
function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById('modal-prompt-text').textContent).then(()=>showToast('✓ คัดลอก Prompt แล้ว'));
  const btn=document.querySelector('.copy-btn');btn.textContent='copied!';setTimeout(()=>btn.textContent='copy',1500);
}

function editPrompt(id){
  const p=prompts.find(x=>x.id===id);if(!p)return;
  document.getElementById('inp-name').value=p.name;
  document.getElementById('inp-prompt').value=p.prompt;
  currentTags=[...p.tags];renderTagPills();
  imageData=p.image||null;
  const pr=document.getElementById('upload-preview');
  if(imageData){pr.src=imageData;pr.style.display='block';document.getElementById('upload-placeholder').style.display='none';document.getElementById('upload-zone').classList.add('has-image');}
  else{pr.style.display='none';document.getElementById('upload-placeholder').style.display='';document.getElementById('upload-zone').classList.remove('has-image');}
  editMode=id;document.querySelector('.btn-save').textContent='✦ อัปเดต Prompt';
  window.scrollTo({top:0,behavior:'smooth'});
}

function deletePrompt(id){
  if(!confirm('ลบ Prompt นี้?'))return;
  prompts=prompts.filter(p=>p.id!==id);
  if(activeFilter&&!prompts.some(p=>p.tags.includes(activeFilter)))activeFilter=null;
  saveData();renderGallery();renderFilters();showToast('✓ ลบ Prompt แล้ว');
}

function showToast(msg){
  const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){return new Date(iso).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});}

/* Boot */
if (isSessionValid()) {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  appInit();
} else {
  renderPinDots(0);
  setTimeout(() => document.getElementById('lock-pw').focus(), 300);
}
</script>
</body>
</html>
